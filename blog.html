<!DOCTYPE html>

<html>
    <head>
        <title>Blog</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 class="pageTitle"><b>Blog Posts</b></h1>
        <button class="themeButton" id="themeButton">Theme</button>
        <div class="container">
            
            <div id="devlog-list" class="content"></div>
            <div class="nav">
                <h3 style="text-align: center;">-- Pages --</h3>
                <ul>
                    <li> <a href="index.html">Home</a> </li>
                    <li> <a href="about.html">About Me</a> </li>
                    <li> <a href="projects.html">Projects</a> </li>
                    <li> <a href="blog.html">Blog</a> </li>
                    <li> <a href="art.html">Art</a> </li>
                </ul>
                <div>
                    <h3 style="text-align: center;">-- Links --</h3>
                    <ul>
                        <li> <a href="https://github.com/Breakfulus">Github</a> </li>
                    </ul>
                </div>
        </div>
        <script src="themeButton.js"></script>
        <script src="posts.js"></script>
        <script>
            posts.sort((a, b) => new Date(b.date) - new Date(a.date))
            posts.sort((a, b) => new Boolean(b.pinned) - new Boolean(a.pinned))
            
            const conatiner = document.getElementById("devlog-list")
            posts.forEach((post, index) => {
                const div = document.createElement("div")
                div.className = "post";

                div.innerHTML = `
                <h2>[${post.date}] ${post.title}</h2>
                <p style="font-size: 11px">${post.type}</p>
                `;

                div.addEventListener("click", () => {
                    localStorage.setItem("currentPost", index)
                    window.location.href = "post.html"; 
                });

                conatiner.appendChild(div);
            });
        </script>
    </body>
</html>
