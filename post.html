<!DOCTYPE html>

<html>
    <head>
        <title>Post</title>
        <style>
            /*Link Styling*/
            a {
                color: beige;
            }
            a:visited {
                color: #6a7abe;
            }
            a:hover {
                color: #a1aeec;
            }
            body {
                background-color: #21294b;
                
                font-family: "Helvetica";
                color:#a1aeec;
            }

            h1 {
                font-size: 35px;
                text-align: center;
            }
            
            /*Main Container*/
            .container {
                width: 1000px;
                display: flex;
                color: #e2dddd;
                margin: auto;
                padding: 20px;
                vertical-align: center;
            }

            /*Container Body Style*/
            .content {
            position: relative;
            background: #36406b;
            flex: 3;
            margin: auto;
            margin-right: 15px;
            border-radius: 15px;
            padding: 25px;
            }

            .nav {
            background: #36406b;
            flex: 1;
            border-radius: 15px;
            margin-right: 15px;
            padding: 20px;
            }
        </style>
        
    </head>
    <body>
        <div class="container">
            <div id="post" class="content"></div>
            <div class="nav">
                <h3 style="text-align: center;">-- Pages --</h3>
                <ul>
                    <li> <a href="index.html">Home</a> </li>
                    <li> <a href="about.html">About Me</a> </li>
                    <li> <a href="projects.html">Projects</a> </li>
                    <li> <a href="devlog.html">Devlog</a> </li>
                    <li> <a href="art.html">Art</a> </li>
                </ul>
                <div>
                    <h3 style="text-align: center;">-- Links --</h3>
                    <ul>
                        <li> <a href="https://github.com/Breakfulus">Github</a> </li>
                    </ul>
                </div>
        </div>
        

        
        <script src="posts.js"></script>
        <script>
            posts.sort((a, b) => new Date(b.date) - new Date(a.date))
            posts.sort((a, b) => new Boolean(b.pinned) - new Boolean(a.pinned))
        const index = localStorage.getItem("currentPost");
        const post = posts[index];

        const container = document.getElementById("post");

        container.innerHTML = `
        <h1><b>${post.title}</b></h1>
        <p>[${post.date}] -- ${post.type}</p>

        <p>${post.content}</p>
        `;
        </script>

    </body>
</html>
